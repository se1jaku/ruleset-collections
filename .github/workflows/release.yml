name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build geoip
        id: build_ip
        run: |
          cd sing-geoip
          go run -v .

      - name: Build geosite
        id: build_site
        run: |
          cd sing-geosite
          go run -v .

      - name: Release rule sets
        if: steps.build.outputs.skip != 'true'
        run: .github/release-rule-set.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate timestamp
        id: time
        run: echo "tag=$(date -u +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create Release + Upload Assets
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.time.outputs.tag }}
          name: ${{ steps.time.outputs.tag }}
          files: |
            sing-geoip/geoip.db
            sing-geoip/geoip-cn.db
            sing-geosite/geosite.db
